[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  included_files = ["dev.sqlite3"]
  ignored_node_modules = ["mysql2", "better-sqlite3", "pg", "tedious", "oracledb", "pg-query-stream", "mysql"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
